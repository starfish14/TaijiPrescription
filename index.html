<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太极处方 - 意动身随，气韵自生</title>
  <style>
    body {
      background-color: #f4f1ea;
      font-family: "PingFang SC", "Microsoft YaHei", serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: #333;
    }

    .container {
      background: #fff;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      width: 90%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      color: #2c3e50;
      font-weight: 300;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin: 1rem 0;
      box-sizing: border-box;
      resize: none;
    }

    button {
      background-color: #2c3e50;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #456789;
    }

    #result {
      margin-top: 2rem;
      padding: 1rem;
      border-top: 1px dashed #ccc;
      line-height: 1.6;
      display: none;
    }

    .loading {
      display: none;
      color: #888;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>太极处方</h1>
    <p style="font-size: 0.9rem; color: #666;">描述您的不适（如：颈椎酸痛、焦虑、失眠）</p>

    <textarea id="userInput" placeholder="例如：最近工作太累，感觉肩膀很僵硬..."></textarea>
    <br>
    <button onclick="getTaijiPrescription()">请方</button>

    <div id="loading" class="loading">正在为您调理气息...</div>
    <div id="result"></div>
  </div>

  <script src="app.js"></script>
</body>

</html>
